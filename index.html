<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book My Ticket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-5xl">

  <!-- AUTH SECTION -->
  <div id="authSection" class="max-w-md mx-auto mb-8">
    <div class="bg-white text-black rounded-2xl shadow-lg p-6 border border-gray-200">

      <h2 class="text-2xl font-semibold text-center mb-6">
        Welcome back
      </h2>

      <div class="flex flex-col gap-3">
        <input id="email" placeholder="Email"
          class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black"/>

        <input id="password" type="password" placeholder="Password"
          class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black"/>

        <input id="firstName" placeholder="First Name"
          class="px-3 py-2 border border-gray-300 rounded-lg hidden"/>

        <input id="lastName" placeholder="Last Name"
          class="px-3 py-2 border border-gray-300 rounded-lg hidden"/>
      </div>

      <div class="flex flex-col gap-3 mt-5">
        <button onclick="login()"
          class="bg-black text-white py-2 rounded-lg hover:bg-gray-900">
          Login
        </button>

        <button onclick="showRegister()"
          class="border border-gray-300 py-2 rounded-lg hover:bg-gray-100">
          Create account
        </button>
      </div>
    </div>
  </div>

  <!-- BOOKING SECTION -->
  <div id="bookingSection" class="hidden">
    <h1 class="text-center text-2xl mb-4">Select Your Seat</h1>
    <table id="tbl" class="mx-auto border-spacing-3"></table>
  </div>

</div>

<script>
let token = "";

// show register inputs
function showRegister() {
  firstName.classList.remove("hidden");
  lastName.classList.remove("hidden");
}

// LOGIN
async function login() {
  const res = await fetch("https://book-my-ticket-production.up.railway.app/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  token = data.data.accessToken;

  document.getElementById("authSection").style.display = "none";
  document.getElementById("bookingSection").style.display = "block";

  run();
}

// REGISTER
async function register() {
  await fetch("https://book-my-ticket-production.up.railway.app/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      firstName: firstName.value,
      lastName: lastName.value,
      email: email.value,
      password: password.value
    })
  });

  alert("Registered! Now login");
}

// SEATS
async function run() {
  const tbl = document.getElementById("tbl");
  tbl.innerHTML = "";

  const res = await fetch("http://localhost:8080/seats");
  const seats = await res.json();

  let tr;
  seats.forEach((seat, i) => {
    if (i % 8 === 0) tr = document.createElement("tr");

    const td = document.createElement("td");

    td.className = seat.isbooked
      ? "bg-red-500 p-4 rounded cursor-not-allowed"
      : "bg-green-500 p-4 rounded cursor-pointer hover:scale-105";

    td.innerText = seat.id;

    td.onclick = async () => {
      if (seat.isbooked) return;

      const name = prompt("Enter your name");
      if (!name) return;

      const res = await fetch(`http://localhost:8080/${seat.id}/${name}`, {
        method: "PUT",
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      const data = await res.json();

      if (data.error) {
        alert("Already booked");
      } else {
        alert("Booked!");
        run();
      }
    };

    tr.appendChild(td);
    tbl.appendChild(tr);
  });
}
</script>

</body>
</html>
